<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시크릿 AI 튜터 (스텔스 모드)</title>
    <style>
        /* 스카/야자 시간에 눈부시지 않게 완벽한 다크 모드 세팅 */
        body { background-color: #121212; color: #00ffcc; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        video { width: 100%; max-width: 400px; border: 2px solid #333; border-radius: 10px; margin-top: 20px; }
        canvas { display: none; } /* 화면 비교용 캔버스는 숨겨둠 */
        #status { font-size: 1.2rem; margin-top: 15px; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <h2>🤫 시크릿 AI 튜터</h2>
    <p>태블릿 카메라로 문제를 비추고 3초간 멈추세요.</p>
    
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    
    <div id="status">👀 카메라 켜는 중...</div>

    <script>
        // ⚠️ 여기에 본인의 Gemini API 키를 넣으세요!
        const API_KEY = "AIzaSyAsO4FSthGy-fmS6bVha5w9cBzKJQ1IFmg"; 
        
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const statusText = document.getElementById('status');
        const ctx = canvas.getContext('2d');

        let isSolving = false; 
        let stillTimer = 0;

        // 1. 태블릿/노트북 카메라 켜기
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }) // 후면 카메라 우선
            .then(stream => {
                video.srcObject = stream;
                statusText.innerText = "✅ 준비 완료! 문제에 시선을 고정하세요.";
                startMotionDetection(); // 카메라 켜지면 감지 시작
            })
            .catch(err => {
                statusText.innerText = "❌ 카메라 권한을 허용해주세요!";
            });

        // 2. 3초 시선 고정 감지 (간이 버전: 1초마다 캡처해서 움직임 체크)
        function startMotionDetection() {
            setInterval(() => {
                if(isSolving) return; // 문제 푸는 중에는 감지 일시정지

                // (실제 상용화 때는 여기서 이전 화면과 지금 화면의 픽셀 차이를 계산해 움직임을 감지해!)
                // 지금은 프로토타입이니까, 화면이 켜져 있으면 3초(3번 카운트) 후에 바로 캡처되도록 시뮬레이션
                stillTimer++;
                statusText.innerText = `⏱️ 고정 중... ${stillTimer}초`;

                if(stillTimer >= 3) {
                    statusText.innerText = "📸 캡처 완료! AI가 풀이를 시작합니다...";
                    captureAndSolve();
                }
            }, 1000); // 1초마다 체크
        }

        // 3. 사진 찍어서 Gemini에게 보내기
        async function captureAndSolve() {
            isSolving = true;
            stillTimer = 0;

            // 비디오 화면을 캔버스에 그리고 Base64(텍스트 이미지)로 변환
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            let base64Image = canvas.toDataURL("image/jpeg").split(',')[1];

            try {
                // Gemini API로 데이터 전송 (REST API 방식)
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "이 사진 속 문제의 정답과 핵심 이유를 스터디 카페에서 속삭이듯 2문장으로 짧게 한국어로 알려줘. 인사말 없이 바로 정답만 말해." },
                                { inline_data: { mime_type: "image/jpeg", data: base64Image } }
                            ]
                        }]
                    })
                });

                const data = await response.json();
                const answerText = data.candidates[0].content.parts[0].text;
                
                statusText.innerText = "💡 정답 수신 완료! (귓속말 재생 중)";
                speakAnswer(answerText); // 귓속말로 읽어주기

            } catch (error) {
                statusText.innerText = "❌ 오류가 발생했어요. 다시 시도해주세요.";
                setTimeout(() => { isSolving = false; }, 3000);
            }
        }

        // 4. 귓속말(TTS) 기능
        function speakAnswer(text) {
            console.log("AI 튜터:", text);
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ko-KR';
            utterance.rate = 1.1; // 약간 빠르게 (문제 풀이 속도감)
            utterance.pitch = 0.5; // 목소리를 낮춰서 조용히 말하는 느낌(ASMR) 연출

            utterance.onend = () => {
                // 다 읽고 나면 3초 쉬었다가 다시 새로운 문제 스캔 준비!
                statusText.innerText = "✅ 준비 완료! 다음 문제를 쳐다보세요.";
                setTimeout(() => { isSolving = false; }, 3000);
            };

            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
